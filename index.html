<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#243b2f">
<title>צ'כיה • טיול משפחות — אוגוסט 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Bellefair&family=Marcellus&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --abyss:#08201e; --abyss2:#0b2a26; --panel:#103530; --panel2:#15433c;
    --ivory:#f3ead4; --ivory2:#c8d3c4; --dim:#8ba096;
    --gold:#d8b471; --gold-bright:#f0d79a; --gold-deep:#a8854a;
    --garnet:#b23347; --garnet-bright:#d8556a;
    --north:#3aa6ad; --south:#5cae6a; --prague:#c25a76; --transit:#d99a48;
    --muted:#8ba096; --green:#5cae6a; --green2:#3f8f5a; --warn:#d8556a; --book:#3d7fd0; --waze:#3d8bd4;
    --line:rgba(216,180,113,.22);
    --disp:'Bellefair',serif; --body:'Assistant',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:var(--body);color:var(--ivory);background:var(--abyss);min-height:100vh;
    padding-bottom:94px;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;line-height:1.5}
  body::before{content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
    background:radial-gradient(900px 620px at 12% -6%, rgba(58,166,173,.18), transparent 60%),
      radial-gradient(820px 600px at 102% 8%, rgba(178,51,71,.15), transparent 55%),
      radial-gradient(760px 720px at 50% 112%, rgba(216,180,113,.12), transparent 60%),
      linear-gradient(162deg,#08201e,#0a2623 58%,#071c1a);}
  h1,h2,h3{font-family:var(--disp);font-weight:400;margin:0;line-height:1.1;letter-spacing:.5px}

  header{position:relative;padding:30px 16px 24px;text-align:center;overflow:hidden}
  .hero-frame{position:relative;max-width:620px;margin:0 auto;padding:28px 22px 22px;border:1px solid var(--line);
    border-radius:22px;background:linear-gradient(160deg,rgba(21,67,60,.66),rgba(8,32,30,.42));
    box-shadow:0 0 0 1px rgba(216,180,113,.10) inset,0 20px 54px rgba(0,0,0,.5);
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both;overflow:hidden}
  .hero-frame::before{content:"";position:absolute;inset:7px;border:1px solid rgba(216,180,113,.30);border-radius:15px;pointer-events:none}
  .hero-frame::after{content:"";position:absolute;top:-50%;left:-30%;width:60%;height:200%;pointer-events:none;
    background:linear-gradient(75deg,transparent,rgba(240,215,154,.10),transparent);animation:shimmer 8s ease-in-out infinite}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes shimmer{0%,100%{transform:translateX(-50%) rotate(8deg);opacity:0}50%{transform:translateX(60%) rotate(8deg);opacity:.9}}
  .kicker{font-family:var(--body);font-weight:600;font-size:13px;letter-spacing:.3px;color:var(--gold);position:relative;max-width:400px;margin:0 auto;line-height:1.5}
  .hero-title{font-size:48px;color:var(--ivory);margin:7px 0 0;text-shadow:0 3px 22px rgba(0,0,0,.45);position:relative}
  .flourish{position:relative;display:flex;align-items:center;justify-content:center;gap:11px;color:var(--gold);margin:8px 0 9px;font-size:12px}
  .flourish span{height:1px;width:56px}
  .flourish span:first-child{background:linear-gradient(90deg,transparent,var(--gold))}
  .flourish span:last-child{background:linear-gradient(90deg,var(--gold),transparent)}
  .dates{position:relative;font-size:13.5px;color:var(--ivory2);font-weight:600}
  .countdown{position:relative;display:inline-flex;align-items:center;gap:8px;margin-top:15px;padding:8px 17px;border-radius:30px;
    background:linear-gradient(135deg,rgba(216,180,113,.20),rgba(216,180,113,.06));border:1px solid rgba(216,180,113,.45);
    color:var(--ivory);font-weight:700;font-size:13.5px}
  .countdown b{color:var(--gold-bright);font-size:17px;font-family:var(--disp)}
  .route-strip{position:relative;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-top:17px;
    font-size:12.5px;font-weight:700;color:var(--ivory2);letter-spacing:.6px}
  .route-strip i{color:var(--gold);font-style:normal;font-size:9px}

  .pillbar{position:sticky;top:0;z-index:40;display:flex;gap:8px;padding:11px 14px;overflow-x:auto;scrollbar-width:none;
    background:rgba(8,32,30,.84);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .pillbar::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;min-width:50px;text-align:center;padding:7px 11px;border-radius:13px;cursor:pointer;line-height:1.15;
    background:rgba(255,255,255,.04);border:1px solid var(--line);transition:.2s}
  .pill .pd{font-family:var(--disp);font-size:18px;color:var(--ivory);display:block}
  .pill .pw{font-size:10px;color:var(--dim);font-weight:700}
  .pill.active{background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));border-color:var(--gold);
    transform:translateY(-2px);box-shadow:0 7px 18px rgba(216,180,113,.32)}
  .pill.active .pd{color:#0a221f}
  .pill.active .pw{color:#0a221f;opacity:.7}

  main{padding:16px 14px 10px;max-width:680px;margin:0 auto}
  .view{display:none;animation:fade .3s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .day{position:relative;background:linear-gradient(165deg,var(--panel),var(--abyss2));border:1px solid var(--line);
    border-radius:20px;margin-bottom:18px;overflow:hidden;box-shadow:0 14px 38px rgba(0,0,0,.42);scroll-margin-top:70px}
  .day::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.6}
  .day-head{display:flex;align-items:center;gap:13px;padding:16px;border-bottom:1px solid var(--line)}
  .daynum{flex:0 0 auto;width:56px;height:56px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;
    background:linear-gradient(140deg,var(--gold-bright),var(--gold-deep));color:#0a221f;
    box-shadow:0 6px 16px rgba(168,133,74,.42),inset 0 1px 0 rgba(255,255,255,.45)}
  .daynum .dn{font-family:var(--disp);font-size:27px}
  .daynum .dm{font-size:9px;font-weight:800;letter-spacing:1.2px;opacity:.72;margin-top:1px;text-transform:uppercase}
  .day-head .meta{flex:1;min-width:0}
  .day-head .wd{font-family:var(--disp);font-size:22px;color:var(--ivory)}
  .day-head .didx{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:.5px}
  .wx{display:inline-block;margin-top:4px;font-size:11.5px;font-weight:700;color:var(--ivory2);
    background:rgba(58,166,173,.14);border:1px solid rgba(58,166,173,.32);border-radius:8px;padding:2px 9px}
  .rbadge{flex:0 0 auto;font-size:11px;font-weight:800;color:#fff;padding:5px 12px;border-radius:20px;white-space:nowrap;
    letter-spacing:.3px;text-shadow:0 1px 2px rgba(0,0,0,.35);box-shadow:0 3px 10px rgba(0,0,0,.3)}

  .stop{padding:14px 16px;border-bottom:1px solid var(--line)}
  .stop:last-child{border-bottom:none}
  .stop .nm{font-weight:700;font-size:16px;color:var(--ivory);display:flex;gap:8px;align-items:flex-start}
  .stop .nm .dot{flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:var(--gold);margin-top:7px;box-shadow:0 0 0 3px rgba(216,180,113,.16)}
  .stop-img{width:100%;height:190px;object-fit:cover;border-radius:14px;margin:11px 0 2px;display:block;
    border:1px solid var(--line);box-shadow:0 8px 20px rgba(0,0,0,.45)}
  .desc{font-size:13.5px;color:var(--ivory2);margin:8px 0 0;padding-inline-start:17px;line-height:1.6}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0 0;padding-inline-start:17px}
  .chip{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:8px;display:inline-flex;gap:4px;align-items:center;border:1px solid transparent}
  .chip.drive{background:rgba(58,166,173,.13);color:#84d6db;border-color:rgba(58,166,173,.3)}
  .chip.price{background:rgba(92,174,106,.13);color:#98d9a1;border-color:rgba(92,174,106,.3)}
  .chip.book{background:rgba(178,51,71,.16);color:#f0a3af;border-color:rgba(178,51,71,.4)}
  .chip.hours{background:rgba(165,113,196,.14);color:#d6b8e8;border-color:rgba(165,113,196,.34)}
  .chip.hw{background:rgba(217,154,72,.14);color:#f2cd8e;border-color:rgba(217,154,72,.34)}
  .chip.openok{background:rgba(92,174,106,.16);color:#a0e2aa;border-color:rgba(92,174,106,.4)}
  .chip.openwarn{background:rgba(178,51,71,.2);color:#f3aab4;border-color:rgba(178,51,71,.5)}
  a.chip{text-decoration:none}
  a.chip.hours:active{transform:scale(.96)}
  .note{font-size:12.5px;color:var(--dim);margin:8px 0 0;padding-inline-start:17px;line-height:1.55;font-style:italic}
  .deal{font-size:12.5px;color:#ecd6a6;background:linear-gradient(180deg,rgba(216,180,113,.13),rgba(216,180,113,.05));
    border:1px solid rgba(216,180,113,.28);border-inline-start:3px solid var(--gold);border-radius:10px;
    padding:9px 12px;margin:9px 0 0;margin-inline-start:17px;line-height:1.55}
  .deal b{color:var(--gold-bright)}
  .navs{display:flex;gap:8px;margin:11px 0 0;margin-inline-start:17px;flex-wrap:wrap}
  .nav-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:700;font-size:12.5px;
    padding:8px 14px;border-radius:12px;color:#fff;transition:transform .15s;
    box-shadow:0 4px 13px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.18)}
  .nav-btn:active{transform:scale(.95)}
  .nav-btn svg{width:14px;height:14px}
  .nav-maps{background:linear-gradient(135deg,#2f9e74,#1f6f52)}
  .nav-waze{background:linear-gradient(135deg,#3d8bd4,#2c6bab)}
  .nav-yt{background:linear-gradient(135deg,#d8453f,#a82e2e)}
  .nav-book{background:linear-gradient(135deg,#3d7fd0,#2a5ea0)}

  .lunch{padding:14px 16px;background:linear-gradient(180deg,rgba(217,154,72,.11),rgba(217,154,72,.03));border-top:1px dashed rgba(216,180,113,.4)}
  .lunch .lh{font-weight:800;font-size:12px;color:var(--gold);letter-spacing:.6px;display:flex;align-items:center;gap:6px;margin-bottom:4px;text-transform:uppercase}
  .lunch .ln{font-weight:700;font-size:15.5px;color:var(--ivory)}
  .lunch .ld{font-size:12.5px;color:var(--ivory2);margin:4px 0 0;line-height:1.55}
  .lcost{display:inline-block;margin-top:8px;font-size:11.5px;font-weight:700;background:rgba(92,174,106,.14);
    color:#98d9a1;border:1px solid rgba(92,174,106,.3);padding:3px 9px;border-radius:7px}

  details.tl{border-top:1px solid var(--line);background:rgba(255,255,255,.02)}
  details.tl summary{padding:12px 16px;font-weight:800;font-size:12.5px;color:var(--gold);cursor:pointer;list-style:none;letter-spacing:.4px}
  details.tl summary::-webkit-details-marker{display:none}
  details.tl summary::before{content:"✦ ";color:var(--gold-deep)}
  details.tl[open] summary::before{content:"✦ ";color:var(--gold-bright)}
  .tlrow{display:flex;gap:12px;padding:6px 17px;font-size:13px;align-items:flex-start;color:var(--ivory2)}
  .tlrow .tt{flex:0 0 auto;font-weight:800;color:var(--gold);width:50px;font-family:var(--disp);font-size:15px}
  .tlrow .tx{flex:1}
  .tlnote{font-size:11px;color:var(--dim);padding:3px 17px 11px;font-style:italic}

  .dayfoot{display:flex;flex-wrap:wrap;gap:9px;align-items:center;padding:12px 16px;background:rgba(0,0,0,.2);border-top:1px solid var(--line)}
  .hotelf{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--ivory2);flex:1;min-width:150px}
  .hotelf svg{width:16px;height:16px;flex:0 0 auto;color:var(--gold);opacity:.85}
  .hotelf b{color:var(--ivory);font-weight:700}
  .budget{font-size:11.5px;font-weight:700;color:#98d9a1;background:rgba(92,174,106,.12);border:1px solid rgba(92,174,106,.3);padding:5px 11px;border-radius:20px}

  .sec-title{font-family:var(--disp);font-size:27px;color:var(--ivory);margin:6px 2px 16px;display:flex;align-items:center;gap:11px;letter-spacing:.5px}
  .sec-title .bar{width:4px;height:25px;background:linear-gradient(var(--gold-bright),var(--gold-deep));border-radius:3px;box-shadow:0 0 12px rgba(216,180,113,.45)}
  .card{background:linear-gradient(165deg,var(--panel),var(--abyss2));border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 12px 32px rgba(0,0,0,.38)}
  .card h3{font-family:var(--disp);font-size:21px;color:var(--ivory);margin-bottom:4px;letter-spacing:.3px}
  .card .sub{font-size:12px;font-weight:700;color:var(--dim);margin-bottom:10px}
  .kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:6px 0;border-top:1px solid var(--line);color:var(--ivory2)}
  .kv:first-of-type{border-top:none}
  .kv .k{color:var(--dim);font-weight:600;flex:0 0 auto}
  .kv .v{text-align:start;font-weight:700;color:var(--ivory)}
  .cost-total{border-radius:16px;padding:16px;margin-bottom:14px}
  .cost-total,.ex-sum{background:linear-gradient(140deg,#15433c,#0c2c28);border:1px solid rgba(216,180,113,.42);
    box-shadow:0 0 0 1px rgba(216,180,113,.1) inset,0 14px 36px rgba(0,0,0,.45)}
  .cost-total .big,.ex-sum .big{font-family:var(--disp);font-size:36px;color:var(--gold-bright)}
  .cost-total .sub{color:var(--ivory2)}
  .pin{display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35)}
  .task{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;padding:10px 0;border-top:1px solid var(--line);color:var(--ivory2)}
  .task:first-child{border-top:none}
  .task .b{flex:0 0 auto;width:19px;height:19px;border:2px solid var(--gold);border-radius:6px;margin-top:1px;cursor:pointer;transition:.15s}
  .task .b.on{background:var(--gold);position:relative}
  .task .b.on::after{content:"✓";color:#0a221f;font-size:13px;font-weight:800;position:absolute;top:-2px;left:2px}
  a.inline{color:var(--gold-bright);font-weight:700;word-break:break-word}
  .backup-group ul{margin:6px 0 0;padding-inline-start:18px}
  .backup-group li{font-size:13.5px;margin:0 0 7px;line-height:1.5;color:var(--ivory2)}
  .small{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.55}
  .infobox{background:rgba(58,166,173,.08);border:1px solid rgba(58,166,173,.25);border-inline-start:3px solid var(--north);
    border-radius:12px;padding:11px 13px;font-size:12.5px;color:var(--ivory2);margin:0 2px 14px;line-height:1.6}
  .infobox.warn{background:rgba(178,51,71,.1);border-color:rgba(178,51,71,.3);border-inline-start-color:var(--garnet)}
  code{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:5px;padding:1px 5px;color:var(--gold-bright);font-size:11px}

  #map{width:100%;height:66vh;min-height:400px;border-radius:18px;border:1px solid var(--line);box-shadow:0 14px 36px rgba(0,0,0,.45)}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin:12px 2px 0;font-size:12px;font-weight:700;color:var(--ivory2)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .progress-wrap{background:linear-gradient(165deg,var(--panel),var(--abyss2));border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 12px 30px rgba(0,0,0,.38)}
  .progress-top{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;color:var(--ivory2);margin-bottom:9px}
  #prog-num{color:var(--gold-bright);font-family:var(--disp);font-size:19px}
  .pbar{height:10px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .pbar>div{height:100%;background:linear-gradient(90deg,var(--gold-deep),var(--gold-bright));border-radius:6px;transition:width .5s}
  .geo-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .geo-btn{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));
    color:#0a221f;border:none;font-family:var(--body);font-weight:800;font-size:13px;padding:10px 15px;border-radius:12px;cursor:pointer;box-shadow:0 6px 16px rgba(168,133,74,.35)}
  .geo-btn.alt{background:rgba(255,255,255,.05);color:var(--ivory);border:1px solid var(--line);box-shadow:none}
  .geo-btn:active{transform:scale(.97)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
  .filt{font-size:12px;font-weight:700;padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ivory2);cursor:pointer;user-select:none;transition:.15s}
  .filt.off{opacity:.4;text-decoration:line-through}
  .geo-banner{display:none;background:linear-gradient(135deg,#2f9e74,#1f6f52);color:#fff;border-radius:14px;padding:12px 14px;margin-bottom:12px;align-items:center;gap:10px;box-shadow:0 10px 26px rgba(0,0,0,.45)}
  .geo-banner.show{display:flex}
  .geo-banner .gbtxt{flex:1;font-size:13.5px;font-weight:700}
  .geo-banner button{background:#fff;color:#1f6f52;border:none;font-family:var(--body);font-weight:800;font-size:13px;padding:8px 13px;border-radius:10px;cursor:pointer;white-space:nowrap}
  .mk{width:30px;height:30px;border-radius:50%;border:2.5px solid #f3ead4;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 9px rgba(0,0,0,.55);position:relative}
  .mk.done{filter:grayscale(.7);opacity:.55}
  .mk .mkv{position:absolute;right:-5px;top:-5px;background:#2e9e3f;color:#fff;width:16px;height:16px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;filter:none}
  .usr{width:18px;height:18px;border-radius:50%;background:#1a73e8;border:3px solid #fff;box-shadow:0 0 0 4px rgba(26,115,232,.3)}
  .leaflet-popup-content-wrapper{background:#10302c;color:var(--ivory);border:1px solid var(--line);border-radius:12px}
  .leaflet-popup-tip{background:#10302c}
  .leaflet-popup-content{font-family:var(--body);direction:rtl;text-align:right;margin:11px 13px;color:var(--ivory)}
  .leaflet-container a.leaflet-popup-close-button{color:var(--dim)}
  .pop-btn{display:block;width:100%;margin-top:8px;background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));color:#0a221f;border:none;font-family:var(--body);font-weight:800;font-size:13px;padding:9px;border-radius:10px;cursor:pointer}
  .pop-btn.done{background:transparent;color:var(--gold-bright);border:1px solid var(--gold)}
  .pop-nav{display:inline-block;margin-top:7px;font-size:12.5px;font-weight:700;color:#6fb6ff;text-decoration:none}

  .exf{display:flex;flex-direction:column;gap:10px}
  .exf label{font-size:12px;font-weight:700;color:var(--dim);margin-bottom:-4px}
  .exf input,.exf select{font-family:var(--body);font-size:15px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.05);color:var(--ivory);width:100%}
  .exf input::placeholder{color:var(--dim)}
  .exf input:focus,.exf select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(216,180,113,.16)}
  .exf .row2{display:flex;gap:9px}
  .exf .row2>div{flex:1}
  .ex-add{background:linear-gradient(135deg,var(--gold-bright),var(--gold-deep));color:#0a221f;border:none;font-family:var(--body);font-weight:800;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;margin-top:2px;box-shadow:0 6px 16px rgba(168,133,74,.35)}
  .ex-add:active{transform:scale(.98)}
  .ex-sum{border-radius:16px;padding:18px;margin-bottom:14px}
  .ex-sum .s2{font-size:14px;color:var(--ivory2);font-weight:600;margin-top:2px}

function tickCountdown(){
  const now=new Date();
  const diff=TRIP_START-now;
  const face=document.getElementById('cd-face'),msg=document.getElementById('cd-msg');
  if(diff>0){
    const s=Math.floor(diff/1000);
    const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),sec=s%60;
    setNum('cd-d',d);setNum('cd-h',h);setNum('cd-m',m);
    const prev=document.getElementById('cd-s');const ps=prev?prev.textContent:'';
    setNum('cd-s',sec);
    if(prev&&!RM&&ps!==pad(sec)){prev.animate([{transform:'scale(1.22)',color:'#fff'},{transform:'scale(1)'}],{duration:280,easing:'ease-out'});}
    const f=faceFor(d);if(face)face.textContent=f[0];if(msg)msg.textContent=f[1];
  } else if(now<=TRIP_END){
    const dn=Math.min(15,Math.floor((now-TRIP_START)/86400000)+1);
    setNum('cd-d',0);setNum('cd-h',0);setNum('cd-m',0);setNum('cd-s',0);
    if(face)face.textContent='🇨🇿';if(msg)msg.textContent='יום '+dn+' בטיול — תהנו!';
  } else {
    if(face)face.textContent='🏡';if(msg)msg.textContent='חזרנו — איזה טיול!';
    setNum('cd-d',0);setNum('cd-h',0);setNum('cd-m',0);setNum('cd-s',0);
  }
}

let TRACK=[],VISITED=new Set(),visLoaded=false,markerById={},userMarker=null,geoWatch=null,showG={attractions:true,food:true,hotel:true},_nearId=null;

function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function updateSyncBadge(){const t=SYNC?'☁️ מסונכרן':'📱 מקומי';document.querySelectorAll('.syncb').forEach(e=>e.textContent=t);}
function refreshMarkers(){if(!mapInited)return;TRACK.forEach(p=>{const m=markerById[p.id];if(m){m.setIcon(mkIcon(p.cat,VISITED.has(p.id)));m.setPopupContent(popHtml(p));}});}
async function initSync(){
  if(!FIREBASE_CONFIG||!FIREBASE_CONFIG.apiKey){updateSyncBadge();return;}
  try{
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js');
    firebase.initializeApp(FIREBASE_CONFIG);fbdb=firebase.database();SYNC=true;updateSyncBadge();
    fbdb.ref('trips/'+TRIP_ID+'/visited').on('value',snap=>{const v=snap.val()||{};VISITED=new Set(Object.keys(v).filter(k=>v[k]));visLoaded=true;refreshMarkers();updateProgress();});
    fbdb.ref('trips/'+TRIP_ID+'/expenses').on('value',snap=>{const v=snap.val()||{};EXP=Object.keys(v).map(k=>Object.assign({id:k},v[k]));expLoaded=true;renderExpensesList();});
  }catch(e){SYNC=false;updateSyncBadge();}
}
async function persistVisited(id,on){if(SYNC&&fbdb){try{await fbdb.ref('trips/'+TRIP_ID+'/visited/'+id).set(on?true:null);}catch(e){}}else{try{await Store.set('cz_visited',JSON.stringify([...VISITED]));}catch(e){}}}
async function persistAddExpense(e){if(SYNC&&fbdb){try{await fbdb.ref('trips/'+TRIP_ID+'/expenses/'+e.id).set({desc:e.desc,date:e.date,amt:e.amt,cur:e.cur,note:e.note});}catch(err){}}else{try{await Store.set('cz_expenses',JSON.stringify(EXP));}catch(err){}}}
async function persistDelExpense(id){if(SYNC&&fbdb){try{await fbdb.ref('trips/'+TRIP_ID+'/expenses/'+id).remove();}catch(e){}}else{try{await Store.set('cz_expenses',JSON.stringify(EXP));}catch(e){}}}
function safeId(s){return s.replace(/[.#$/\[\]]/g,'-');}
function buildTrack(){
  const by={};
  function add(id,name,co,cat,day,q){
    if(by[id]){if(by[id].days.indexOf(day)<0)by[id].days.push(day);return;}
    by[id]={id,name,lat:co.lat,lon:co.lon,cat,q,days:[day]};
  }
  DAYS.forEach(d=>{
    d.stops.forEach(s=>{const co=STOPCO[s.maps];if(co)add('a:'+safeId(s.maps),s.nm,co,co.cat,d.d,s.maps);});
    if(d.lunch){const co=FOODCO[d.lunch.maps];if(co)add('f:'+safeId(d.lunch.maps),d.lunch.nm,co,'food',d.d,d.lunch.maps);}
    if(d.hotel&&d.hotel!=='—'){const co=HOTELCO[d.hotel];if(co)add('h:'+safeId(d.hotel),d.hotel,co,'hotel',d.d,d.hotel);}
  });
  TRACK=Object.values(by);
}
function mkIcon(cat,done){const s=CAT[cat];
  return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],popupAnchor:[0,-15],
    html:'<div class="mk'+(done?' done':'')+'" style="background:'+s.c+'">'+s.e+(done?'<span class="mkv">✓</span>':'')+'</div>'});}
function popHtml(p){const done=VISITED.has(p.id);const days=p.days.sort((a,b)=>a-b).map(x=>x+'/8').join(', ');
  return '<div style="font-weight:800;font-size:14px;margin-bottom:2px">'+CAT[p.cat].e+' '+p.name+'</div>'+
    '<div style="font-size:12px;color:#9fb0a6">📅 '+days+'</div>'+
    '<a class="pop-nav" target="_blank" rel="noopener" href="'+mapsUrl(p.q)+'">🧭 נווט לכאן</a>'+
    '<button class="pop-btn'+(done?' done':'')+'" onclick="toggleVisited(\''+p.id.replace(/'/g,"\\'")+'\')">'+(done?'✓ היינו כאן — בטל':'סמן: היינו כאן ✓')+'</button>';}
async function toggleVisited(id){
  const on=!VISITED.has(id);
  if(on)VISITED.add(id);else VISITED.delete(id);
  visLoaded=true;await persistVisited(id,on);
  const m=markerById[id];if(m){const p=TRACK.find(t=>t.id===id);m.setIcon(mkIcon(p.cat,VISITED.has(id)));m.setPopupContent(popHtml(p));}
  updateProgress();
}
function updateProgress(){
  const done=TRACK.filter(t=>VISITED.has(t.id)).length,tot=TRACK.length;
  const pe=document.getElementById('prog-num'),pb=document.getElementById('prog-bar');
  if(pe)pe.textContent=done+' / '+tot;
  if(pb)pb.style.width=(tot?Math.round(done/tot*100):0)+'%';
}
function applyFilters(){
  TRACK.forEach(p=>{const m=markerById[p.id];if(!m)return;const vis=showG[CAT[p.cat].g];
    if(vis&&!leafMap.hasLayer(m))m.addTo(leafMap);else if(!vis&&leafMap.hasLayer(m))leafMap.removeLayer(m);});
}
function toggleFilter(g,el){showG[g]=!showG[g];el.classList.toggle('off',!showG[g]);applyFilters();}
function haversine(a,b,c,d){const R=6371000,t=x=>x*Math.PI/180;const dla=t(c-a),dlo=t(d-b);
  const h=Math.sin(dla/2)**2+Math.cos(t(a))*Math.cos(t(c))*Math.sin(dlo/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function startGeo(){
  if(!navigator.geolocation){geoMsg('המכשיר לא תומך באיתור מיקום — אפשר לסמן ידנית.');return;}
  geoMsg('מאתר מיקום…');
  if(geoWatch!=null){navigator.geolocation.clearWatch(geoWatch);geoWatch=null;
    document.getElementById('geo-toggle').textContent='📍 עקוב אחרי המיקום שלי';if(userMarker){leafMap.removeLayer(userMarker);userMarker=null;}
    document.getElementById('geo-banner').classList.remove('show');return;}
  document.getElementById('geo-toggle').textContent='⏸️ הפסק מעקב';
  let first=true;
  geoWatch=navigator.geolocation.watchPosition(pos=>{
    const la=pos.coords.latitude,lo=pos.coords.longitude;
    if(!userMarker)userMarker=L.marker([la,lo],{icon:L.divIcon({className:'',html:'<div class="usr"></div>',iconSize:[18,18],iconAnchor:[9,9]}),zIndexOffset:1000}).addTo(leafMap);
    else userMarker.setLatLng([la,lo]);
    if(first){leafMap.setView([la,lo],12);first=false;}
    let near=null,nd=1e12;
    TRACK.forEach(p=>{if(VISITED.has(p.id))return;const dd=haversine(la,lo,p.lat,p.lon);if(dd<nd){nd=dd;near=p;}});
    const b=document.getElementById('geo-banner');
    if(near&&nd<250){_nearId=near.id;b.classList.add('show');
      b.innerHTML='<div class="gbtxt">📍 אתם ליד <b>'+near.name+'</b> ('+Math.round(nd)+' מ׳)</div><button onclick="markNear()">היינו כאן ✓</button>';
    } else b.classList.remove('show');
  },err=>{geoMsg('לא ניתן לאתר מיקום ('+(err.code===1?'ההרשאה נדחתה':'שגיאה')+'). אפשר לסמן ידנית בלחיצה על נקודה.');
    document.getElementById('geo-toggle').textContent='📍 עקוב אחרי המיקום שלי';geoWatch=null;
  },{enableHighAccuracy:true,maximumAge:15000,timeout:20000});
}
function geoMsg(t){const b=document.getElementById('geo-banner');b.classList.add('show');b.innerHTML='<div class="gbtxt">'+t+'</div>';
  setTimeout(()=>{if(b.innerHTML.indexOf('אתם ליד')<0)b.classList.remove('show');},5000);}

function renderMap(){
  if(mapInited)return;mapInited=true;
  if(!TRACK.length)buildTrack();
  const v=document.getElementById('view-map');
  v.innerHTML='<h2 class="sec-title"><span class="bar"></span>מפת המסע — מעקב חי</h2>'+
    '<div class="progress-wrap"><div class="progress-top"><span>✓ ביקרתם ב-<span id="prog-num">0 / 0</span> מקומות</span><span class="syncb" style="font-size:11px;color:var(--muted)">📱 מקומי</span></div>'+
      '<div class="pbar"><div id="prog-bar" style="width:0%"></div></div></div>'+
    '<div class="geo-row"><button class="geo-btn" id="geo-toggle" onclick="startGeo()">📍 עקוב אחרי המיקום שלי</button>'+
      '<button class="geo-btn alt" onclick="if(leafMap)leafMap.fitBounds(L.latLngBounds(MAPPTS.map(p=>[p.lat,p.lon])).pad(0.12))">🗺️ כל המסלול</button></div>'+
    '<div class="geo-banner" id="geo-banner"></div>'+
    '<div class="filters"><span class="filt" onclick="toggleFilter(\'attractions\',this)">🎢 אטרקציות</span>'+
      '<span class="filt" onclick="toggleFilter(\'food\',this)">🍽️ מסעדות</span>'+
      '<span class="filt" onclick="toggleFilter(\'hotel\',this)">🏨 מלונות</span></div>'+
    '<div id="map"></div>'+
    '<div class="legend"><span>🎢 אטרקציה</span><span>🏰 טירה</span><span>⛰️ טבע</span><span>🌊 מים</span><span>🦁 גן חיות</span><span>🍽️ מסעדה</span><span>🏨 מלון</span></div>'+
    '<div class="infobox" style="margin-top:12px">לחצו על נקודה כדי לסמן "היינו כאן ✓" — הסימון נשמר במכשיר. "עקוב אחרי המיקום שלי" ידגיש נקודה קרובה (עד 250 מ׳) ויאפשר סימון מהיר. המעקב דורש אישור הרשאת מיקום ונתב HTTPS.</div>';
  setTimeout(()=>{
    leafMap=L.map('map',{scrollWheelZoom:false}).setView([49.7,14.5],7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(leafMap);
    const route=MAPPTS.map(p=>[p.lat,p.lon]);
    L.polyline(route,{color:'#b8893a',weight:3,opacity:.55,dashArray:'7 7'}).addTo(leafMap);
    markerById={};
    TRACK.forEach(p=>{const m=L.marker([p.lat,p.lon],{icon:mkIcon(p.cat,VISITED.has(p.id))}).addTo(leafMap).bindPopup(popHtml(p),{maxWidth:240});
      markerById[p.id]=m;});
    applyFilters();updateProgress();
    leafMap.fitBounds(L.latLngBounds(TRACK.map(p=>[p.lat,p.lon])).pad(0.12));
  },80);
}
async function initVisited(){try{const raw=await Store.get('cz_visited');if(!visLoaded&&raw)VISITED=new Set(JSON.parse(raw));}catch(e){}visLoaded=true;if(mapInited){TRACK.forEach(p=>{const m=markerById[p.id];if(m)m.setIcon(mkIcon(p.cat,VISITED.has(p.id)));});updateProgress();}}

function switchTab(name){
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('on',el.id==='view-'+name));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===name));
  document.getElementById('pillbar').style.display=(name==='route')?'flex':'none';
  if(name==='map'){renderMap();setTimeout(()=>{if(leafMap)leafMap.invalidateSize();},120);}
  if(name!=='route')window.scrollTo({top:0,behavior:'smooth'});
}

async function loadWeather(){
  try{
    const lats=DAYS.map(d=>d.lat).join(','),lons=DAYS.map(d=>d.lon).join(',');
    const url='https://api.open-meteo.com/v1/forecast?latitude='+lats+'&longitude='+lons+
      '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&start_date=2026-08-11&end_date=2026-08-25&timezone=Europe%2FPrague';
    const r=await fetch(url);if(!r.ok)throw 0;const j=await r.json();const arr=Array.isArray(j)?j:[j];
    DAYS.forEach((d,i)=>{const loc=arr[i];if(!loc||!loc.daily||loc.daily.temperature_2m_max[i]==null)return;
      const hi=Math.round(loc.daily.temperature_2m_max[i]),lo=Math.round(loc.daily.temperature_2m_min[i]);
      const code=loc.daily.weather_code[i],pp=loc.daily.precipitation_probability_max[i];
      const el=document.getElementById('wx-'+d.d);
      if(el){el.textContent=wxEmoji(code)+' '+hi+'°/'+lo+'°'+(pp!=null?' · '+pp+'%🌧️':'');el.title='תחזית חיה (Open-Meteo)';el.style.background='#e2f0e0';}
    });
  }catch(e){/* keep seasonal fallback */}
}

const _mem={};
const Store={
  async get(k){try{if(window.storage&&window.storage.get){const r=await window.storage.get(k);return r?r.value:null;}}catch(e){}
    try{return localStorage.getItem(k);}catch(e){return _mem[k]||null;}},
  async set(k,v){try{if(window.storage&&window.storage.set){await window.storage.set(k,v);return;}}catch(e){}
    try{localStorage.setItem(k,v);}catch(e){_mem[k]=v;}}
};
let EXP=[];let expLoaded=false;
function toCZK(amt,cur){if(cur==='₪')return amt/RATE_ILS;if(cur==='€')return amt/RATE_EUR;return amt;}

async function addExpense(){
  expLoaded=true;
  const desc=document.getElementById('ex-desc').value.trim();
  const date=document.getElementById('ex-date').value;
  const amt=parseFloat(document.getElementById('ex-amt').value);
  const cur=document.getElementById('ex-cur').value;
  const note=document.getElementById('ex-note').value.trim();
  if(!desc||isNaN(amt)){alert('נא למלא לפחות הוצאה וסכום');return;}
  const e={id:'e'+Date.now()+Math.floor(Math.random()*999),desc,date,amt,cur,note};
  if(!SYNC)EXP.push(e);
  await persistAddExpense(e);
  document.getElementById('ex-desc').value='';document.getElementById('ex-amt').value='';document.getElementById('ex-note').value='';
  renderExpensesList();
}
async function delExpense(id){
  EXP=EXP.filter(e=>e.id!==id);
  await persistDelExpense(id);
  renderExpensesList();
}
function renderExpensesList(){
  const list=document.getElementById('ex-list');if(!list)return;
  if(!EXP.length){list.innerHTML='<div class="ex-empty">עדיין לא נרשמו הוצאות 💸<br>הוסיפו את ההוצאה הראשונה למעלה.</div>';}
  else{
    const sorted=[...EXP].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    list.innerHTML=sorted.map(e=>{
      const dd=e.date?e.date.slice(8,10)+'/'+e.date.slice(5,7):'—';
      return '<div class="ex-row"><div class="exdt">'+dd+'</div>'+
        '<div class="exmid"><div class="exnm">'+e.desc+'</div>'+(e.note?'<div class="exnote">'+e.note+'</div>':'')+'</div>'+
        '<div class="examt">'+(e.cur==='CZK'?(e.amt+' CZK'):(e.amt+' '+e.cur))+'</div>'+
        '<button class="exdel" onclick="delExpense(\''+e.id+'\')">✕</button></div>';
    }).join('');
  }
  const totalCZK=EXP.reduce((s,e)=>s+toCZK(e.amt,e.cur),0);
  const tc=document.getElementById('ex-total-czk'),ti=document.getElementById('ex-total-ils');
  if(tc)tc.textContent=rd(totalCZK).toLocaleString('en-US')+' CZK';
  if(ti)ti.textContent='≈ '+rd(totalCZK*RATE_ILS).toLocaleString('en-US')+' ₪';
}
async function initExpenses(){try{const raw=await Store.get('cz_expenses');if(expLoaded)return;EXP=raw?JSON.parse(raw):[];}catch(e){if(!expLoaded)EXP=[];}expLoaded=true;renderExpensesList();}

async function loadRate(){
  try{const r=await fetch('https://open.er-api.com/v6/latest/CZK');if(!r.ok)throw 0;const j=await r.json();
    if(j&&j.rates){if(j.rates.ILS)RATE_ILS=j.rates.ILS;if(j.rates.EUR)RATE_EUR=j.rates.EUR;updateRates();renderExpensesList();}

}
