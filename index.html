<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#243b2f">
<title>צ'כיה • טיול משפחות — אוגוסט 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --paper:#f3ede0; --paper2:#ece3d2; --ink:#28251f; --muted:#7a7163; --line:#ddd2bd;
    --north:#2f6f7a; --south:#4f7d3a; --prague:#8a3b4c; --transit:#b07d2b;
    --gold:#b8893a; --green:#243b2f; --green2:#33543f;
    --warn:#c0561f; --card:#fbf7ee; --waze:#2f6fb0; --book:#1a5fb4;
    --shadow:0 6px 22px rgba(40,37,31,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;color:var(--ink);background:var(--paper);
    background-image:radial-gradient(circle at 12% 8%, rgba(184,137,58,.06), transparent 40%),
                     radial-gradient(circle at 88% 92%, rgba(36,59,47,.06), transparent 42%);
    line-height:1.5;padding-bottom:86px;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Frank Ruhl Libre',serif;margin:0;line-height:1.15}

  header{background:linear-gradient(160deg,#243b2f 0%,#33543f 70%,#3c6049 100%);
    color:#f3ede0;padding:26px 18px 22px;position:relative;overflow:hidden;border-bottom:3px solid var(--gold);}
  header::after{content:"";position:absolute;inset:0;opacity:.07;
    background-image:repeating-linear-gradient(45deg,#fff 0 2px,transparent 2px 9px);}
  .kicker{font-size:12.5px;letter-spacing:3px;font-weight:700;color:#e9c98a;text-transform:uppercase;position:relative}
  header h1{font-size:33px;font-weight:900;margin:4px 0 6px;position:relative}
  .dates{font-size:14.5px;color:#d8e3da;position:relative;font-weight:500}
  .countdown{position:relative;margin-top:14px;display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.12);border:1px solid rgba(233,201,138,.4);
    padding:7px 14px;border-radius:30px;font-size:13.5px;font-weight:700;color:#f3ede0}
  .countdown b{color:#e9c98a;font-size:16px}
  .route-strip{position:relative;margin-top:16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:11.5px;font-weight:700}
  .route-strip span{background:rgba(255,255,255,.1);padding:4px 9px;border-radius:6px}
  .route-strip i{color:#e9c98a;font-style:normal}

  .pillbar{position:sticky;top:0;z-index:40;background:rgba(243,237,224,.93);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);overflow-x:auto;display:flex;gap:7px;padding:10px 14px;scrollbar-width:none}
  .pillbar::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:13px;
    padding:6px 10px;text-align:center;cursor:pointer;min-width:48px;transition:.18s;line-height:1.15}
  .pill .pd{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:15px;display:block}
  .pill .pw{font-size:10px;color:var(--muted);font-weight:700}
  .pill.active{background:var(--green);border-color:var(--green);color:#fff;transform:translateY(-1px)}
  .pill.active .pw{color:#e9c98a}

  main{padding:16px 14px 10px;max-width:680px;margin:0 auto}
  .view{display:none;animation:fade .25s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .day{background:var(--card);border:1px solid var(--line);border-radius:18px;margin-bottom:16px;
    box-shadow:var(--shadow);overflow:hidden;scroll-margin-top:64px}
  .day-head{display:flex;align-items:center;gap:13px;padding:14px 15px;border-bottom:1px solid var(--line)}
  .daynum{flex:0 0 auto;width:54px;height:54px;border-radius:14px;background:var(--green);color:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .daynum .dn{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900}
  .daynum .dm{font-size:10px;font-weight:700;color:#e9c98a;margin-top:2px}
  .day-head .meta{flex:1;min-width:0}
  .day-head .wd{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700}
  .day-head .didx{font-size:11.5px;color:var(--muted);font-weight:700}
  .wx{display:inline-block;margin-top:3px;font-size:12px;font-weight:700;color:#3a5a4a;
    background:#e7eef0;border-radius:7px;padding:2px 8px}
  .rbadge{flex:0 0 auto;font-size:11.5px;font-weight:800;color:#fff;padding:5px 11px;border-radius:20px;white-space:nowrap}

  .stop{padding:13px 15px;border-bottom:1px dashed var(--line)}
  .stop:last-child{border-bottom:none}
  .stop .nm{font-weight:700;font-size:15.5px;display:flex;gap:7px;align-items:flex-start}
  .stop .nm .dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:7px}
  .stop-img{width:100%;height:178px;object-fit:cover;border-radius:13px;margin:11px 0 2px;display:block;
    background:#e9e0cd;box-shadow:0 3px 10px rgba(40,37,31,.12)}
  .desc{font-size:13.5px;color:#403a30;margin:8px 0 0;padding-inline-start:15px;line-height:1.55}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 0 0;padding-inline-start:15px}
  .chip{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;display:inline-flex;gap:4px;align-items:center}
  .chip.drive{background:#e7eef0;color:#2f6f7a}
  .chip.price{background:#eaf1e3;color:#3f6a2d}
  .chip.book{background:#fbe9df;color:var(--warn)}
  .chip.hours{background:#eee8f0;color:#7a4a86}
  .chip.hw{background:#fdf0d8;color:#9a6a14}
  .chip.openok{background:#e2f0e0;color:#3a7a32}
  .chip.openwarn{background:#fbe0e0;color:#b03030}
  .note{font-size:12.5px;color:#6a6253;margin:7px 0 0;padding-inline-start:15px;line-height:1.5;font-style:italic}
  .deal{font-size:12.5px;color:#6a5a23;background:#f7eecf;border:1px solid #e6d4a4;border-radius:10px;
    padding:8px 11px;margin:9px 0 0;margin-inline-start:15px;line-height:1.55}
  .deal b{color:#8a6a1f}
  .navs{display:flex;gap:8px;margin:10px 0 0;margin-inline-start:15px;flex-wrap:wrap}
  .nav-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:700;font-size:12.5px;
    padding:7px 13px;border-radius:11px;transition:.15s}
  .nav-btn:active{transform:scale(.96)}
  .nav-btn svg{width:14px;height:14px}
  .nav-maps{background:var(--green);color:#fff}
  .nav-waze{background:var(--waze);color:#fff}
  .nav-yt{background:#c0341f;color:#fff}
  .nav-book{background:var(--book);color:#fff}

  .lunch{padding:13px 15px;background:linear-gradient(180deg,#f6efe0,#f1e7d2);border-top:2px dotted var(--gold)}
  .lunch .lh{font-weight:800;font-size:13px;color:var(--warn);display:flex;align-items:center;gap:6px;margin-bottom:4px}
  .lunch .ln{font-weight:700;font-size:15px}
  .lunch .ld{font-size:12.5px;color:#5a5346;margin:4px 0 0;line-height:1.5}
  .lcost{display:inline-block;margin-top:7px;font-size:11.5px;font-weight:700;background:#eaf1e3;color:#3f6a2d;padding:3px 9px;border-radius:7px}

  details.tl{margin:0;border-top:1px dashed var(--line);background:#fcfaf3}
  details.tl summary{padding:11px 15px;font-weight:800;font-size:13px;color:var(--green);cursor:pointer;list-style:none}
  details.tl summary::-webkit-details-marker{display:none}
  details.tl summary::before{content:"▸ ";color:var(--gold)}
  details.tl[open] summary::before{content:"▾ "}
  .tlrow{display:flex;gap:11px;padding:6px 16px;font-size:13px;align-items:flex-start}
  .tlrow .tt{flex:0 0 auto;font-weight:800;color:var(--gold);width:46px;font-variant-numeric:tabular-nums}
  .tlrow .tx{flex:1}
  .tlnote{font-size:11px;color:var(--muted);padding:2px 16px 10px;font-style:italic}

  .dayfoot{display:flex;flex-wrap:wrap;gap:9px;align-items:center;padding:11px 15px;background:var(--paper2)}
  .hotelf{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:#4a4234;flex:1;min-width:140px}
  .hotelf svg{width:16px;height:16px;flex:0 0 auto;opacity:.7}
  .hotelf b{font-weight:800;color:var(--ink)}
  .budget{font-size:12px;font-weight:800;color:#3f6a2d;background:#e4eedc;border:1px solid #cadcbd;padding:5px 11px;border-radius:20px;white-space:nowrap}

  .sec-title{font-size:21px;font-weight:900;margin:4px 2px 14px;display:flex;align-items:center;gap:9px}
  .sec-title .bar{width:5px;height:22px;background:var(--gold);border-radius:3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card h3{font-size:17px;font-weight:700;margin-bottom:3px}
  .card .sub{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px}
  .kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:5px 0;border-top:1px dashed var(--line)}
  .kv:first-of-type{border-top:none}
  .kv .k{color:var(--muted);font-weight:600;flex:0 0 auto}
  .kv .v{text-align:start;font-weight:600}
  .cost-total{background:linear-gradient(135deg,#243b2f,#33543f);color:#fff;border:none}
  .cost-total .big{font-family:'Frank Ruhl Libre',serif;font-size:30px;font-weight:900;color:#e9c98a}
  .pin{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;color:#fff}
  .task{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;padding:9px 0;border-top:1px dashed var(--line)}
  .task:first-child{border-top:none}
  .task .b{flex:0 0 auto;width:18px;height:18px;border:2px solid var(--gold);border-radius:5px;margin-top:1px;cursor:pointer}
  .task .b.on{background:var(--gold);position:relative}
  .task .b.on::after{content:"✓";color:#fff;font-size:13px;position:absolute;top:-3px;left:2px;font-weight:800}
  .backup-group ul{margin:6px 0 0;padding-inline-start:18px}
  .backup-group li{font-size:13.5px;margin:0 0 7px;line-height:1.5}
  .small{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
  .infobox{background:#fdf3e9;border:1px solid #ecd9c2;border-radius:12px;padding:11px 13px;font-size:12.5px;color:#6a5638;margin:0 2px 14px;line-height:1.55}
  .infobox.warn{background:#fbeee6;border-color:#e8c5ad;color:#8a4a28}
  a.inline{color:var(--book);font-weight:700;word-break:break-word}

  #map{width:100%;height:74vh;min-height:430px;border-radius:16px;border:1px solid var(--line);box-shadow:var(--shadow)}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin:12px 2px 0;font-size:12px;font-weight:700}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:13px;height:13px;border-radius:50%;display:inline-block}

  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(36,59,47,.97);backdrop-filter:blur(12px);
    display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));border-top:2px solid var(--gold)}
  .tab{flex:1;background:none;border:none;color:#a9bcae;font-family:'Heebo';font-weight:700;font-size:10.5px;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 0;transition:.15s}
  .tab svg{width:20px;height:20px}
  .tab.active{color:#e9c98a}
</style>
</head>
<body>

<header>
  <div class="kicker">Česká republika · מסלול משפחתי</div>
  <h1>טיול צ'כיה 🇨🇿</h1>
  <div class="dates">11–25 באוגוסט 2026 · 15 ימים · 2 משפחות, 6 ילדים (6–12)</div>
  <div class="countdown" id="countdown"></div>
  <div class="route-strip">
    <span>פראג ✈️</span><i>←</i><span>צפון 🏔️</span><i>←</i><span>פראג 💧</span><i>←</i><span>דרום 🌲</span><i>←</i><span>פראג 🏰</span>
  </div>
</header>

<div class="pillbar" id="pillbar"></div>

<main>
  <section class="view on" id="view-route"></section>
  <section class="view" id="view-map"></section>
  <section class="view" id="view-hotels"></section>
  <section class="view" id="view-drive"></section>
  <section class="view" id="view-info"></section>
</main>

<nav class="tabbar">

  <button class="tab" data-v="map" onclick="switchTab('map')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>מפה</button>
  <button class="tab" data-v="hotels" onclick="switchTab('hotels')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21V8l9-5 9 5v13"/><path d="M3 21h18M9 21v-5h6v5"/></svg>מלונות</button>
  <button class="tab" data-v="drive" onclick="switchTab('drive')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 11l1.5-4.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11M5 11h14v5H5zM7 16v2M17 16v2"/><circle cx="7.5" cy="13.5" r="1"/><circle cx="16.5" cy="13.5" r="1"/></svg>נהיגה</button>
  <button class="tab" data-v="info" onclick="switchTab('info')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>מידע</button>
</nav>

 {d:13,region:'צפון',hotel:'Špindl Lodge / Pension Slunečnice',lat:50.726,lon:15.609,budget:'≈ 450–550 ₪ (כניסות, ~10 נפשות)',stops:[

function buildTimeline(day){
  if(day.d===11) return {rows:[['~20:45','🛬 נחיתה בפראג (LY2523)'],['21:15','🚗 איסוף רכב / מונית'],['22:00','🏨 צ׳ק-אין במלון Hoffmeister + מנוחה']],note:'נחיתה בערב — היום הפעיל הראשון מתחיל ב-12.8'};
  if(day.d===25) return {rows:[['08:00','🍳 ארוחת בוקר'],['09:30','🧳 צ׳ק-אאוט מהדירה'],['10:00','🛒 קניית מזכרות אחרונה'],['11:00','🚗 נסיעה לשדה התעופה'],['—','✈️ לפי שעת הטיסה — להגיע ~3ש׳ לפני']],note:'לתאם לפי שעת ההמראה'};
  const rows=[['08:00','🍳 ארוחת בוקר במלון']];
  rows.push(['09:00','🚗 יציאה'+(day.stops[0]&&day.stops[0].drive?' — '+day.stops[0].drive:'')]);
  const slots=['10:00','14:30','16:00'];
  if(day.stops[0]) rows.push(['10:00','📍 '+day.stops[0].nm]);
  if(day.lunch) rows.push(['13:00','🍽️ צהריים — '+day.lunch.nm]);
  if(day.stops[1]) rows.push([slots[1],'📍 '+day.stops[1].nm]);
  if(day.stops[2]) rows.push([slots[2],'📍 '+day.stops[2].nm]);
  rows.push(['18:30','🏨 חזרה / מנוחה']);
  rows.push(['19:30','🍽️ ארוחת ערב']);
  return {rows,note:'הצעה גמישה — התאימו לקצב של הילדים'};
}

function renderRoute(){

  DAYS.forEach((day,i)=>{

    const fb=fbTemp(day.region);
    let stops='';
    day.stops.forEach(s=>{
      let chips='';
      if(s.drive)chips+='<span class="chip drive">🚗 '+s.drive+'</span>';
      if(HWSET.has(s.maps))chips+='<span class="chip hw">🛣️ כביש מהיר (ויניאטה!)</span>';
      if(s.price)chips+='<span class="chip price">🎟️ '+s.price+'</span>';
      if(HOURSBY[s.maps]&&HOURSBY[s.maps]!=='—')chips+='<span class="chip hours">🗓️ '+HOURSBY[s.maps]+'</span>';
      if(CLOSED_MON.has(s.maps))chips+=(wk===1?'<span class="chip openwarn">⛔ סגור ביום שני!</span>':'<span class="chip openok">✓ פתוח בתאריך זה</span>');
      if(s.book)chips+='<span class="chip book">⚠️ '+s.book+'</span>';
      const imgKey=IMGBY[s.maps],imgUrl=imgKey?IMG[imgKey]:null,deal=DEALBY[s.maps];
      stops+='<div class="stop"><div class="nm"><span class="dot"></span>'+s.nm+'</div>'+
        (imgUrl?'<img class="stop-img" loading="lazy" src="'+imgUrl+'" alt="'+s.nm+'" onerror="this.style.display=\'none\'">':'')+
        (s.desc?'<p class="desc">'+s.desc+'</p>':'')+
        (chips?'<div class="chips">'+chips+'</div>':'')+
        (s.note?'<p class="note">💡 '+s.note+'</p>':'')+
        (deal?'<div class="deal"><b>💸 הטבות:</b> '+deal+'</div>':'')+
        navButtons(s.maps,{yt:true})+'</div>';
    });
    let lunch='';
    if(day.lunch){const lc=LCOSTBY[day.lunch.maps];
      lunch='<div class="lunch"><div class="lh">🍽️ צהריים</div><div class="ln">'+day.lunch.nm+'</div>'+
        (day.lunch.desc?'<p class="ld">'+day.lunch.desc+'</p>':'')+
        (lc?'<div class="lcost">💵 '+lc+'</div>':'')+navButtons(day.lunch.maps)+'</div>';
    }
    const tl=buildTimeline(day);let tlrows='';
    tl.rows.forEach(r=>tlrows+='<div class="tlrow"><span class="tt">'+r[0]+'</span><span class="tx">'+r[1]+'</span></div>');

    html+='<div class="day" id="day-'+day.d+'">'+
      '<div class="day-head"><div class="daynum"><span class="dn">'+day.d+'</span><span class="dm">'+MON[7]+'</span></div>'+
        '<div class="meta"><div class="wd">'+WD[wk]+'</div><div class="didx">יום '+(i+1)+' מתוך 15</div>'+
        '<span class="wx" id="wx-'+day.d+'" title="ממוצע עונתי — תחזית מדויקת מתעדכנת אוטומטית כ-16 ימים לפני">≈ '+fb[0]+'°/'+fb[1]+'° · אוג׳</span></div>'+
        '<div class="rbadge" style="background:'+rs.c+'">'+rs.e+' '+day.region+'</div></div>'+
      stops+lunch+timeline+
      '<div class="dayfoot"><div class="hotelf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-5h18v5M3 13V7a1 1 0 0 1 1-1h6v7M14 13V8h6a1 1 0 0 1 1 1v4"/></svg>'+
        (day.hotel==='—'?'<span>טיסה הביתה ✈️</span>':'לינה: <b>'+day.hotel+'</b>')+'</div>'+
        (day.budget?'<span class="budget">💰 '+day.budget+'</span>':'')+'</div></div>';
  });
  v.innerHTML=html;
}

let mapInited=false,leafMap=null;
function renderMap(){
  if(mapInited)return;mapInited=true;
  const v=document.getElementById('view-map');
  v.innerHTML='<h2 class="sec-title"><span class="bar"></span>מפת המסלול</h2>'+
    '<div class="infobox">מבט-על על המעבר: פראג → צפון (הרי הענק) → מעבר → דרום (שומאווה/ליפנו) → חזרה לפראג. הקו מחבר את הנקודות לפי סדר הימים.</div>'+
    '<div id="map"></div>'+
    '<div class="legend"><span><i style="background:#8a3b4c"></i>פראג</span><span><i style="background:#2f6f7a"></i>צפון</span><span><i style="background:#b07d2b"></i>מעבר</span><span><i style="background:#4f7d3a"></i>דרום</span></div>';
  setTimeout(()=>{
    leafMap=L.map('map',{scrollWheelZoom:false}).setView([49.7,14.5],7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(leafMap);
    const latlngs=[];
    MAPPTS.forEach(p=>{
      const hex=regionStyle(p.r).hex;
      L.circleMarker([p.lat,p.lon],{radius:9,color:'#fff',weight:2,fillColor:hex,fillOpacity:1})
        .addTo(leafMap).bindPopup('<div style="font-weight:800;font-family:Heebo">'+p.n+'</div><div style="font-size:12px">ימים: '+p.d+'</div>');
      latlngs.push([p.lat,p.lon]);
    });
    L.polyline(latlngs,{color:'#b8893a',weight:3,opacity:.8,dashArray:'7 6'}).addTo(leafMap);
    L.polyline([latlngs[latlngs.length-1],MAPPTS[0]?[MAPPTS[0].lat,MAPPTS[0].lon]:latlngs[0]],{color:'#b8893a',weight:3,opacity:.5,dashArray:'2 8'}).addTo(leafMap);
    leafMap.fitBounds(L.latLngBounds(latlngs).pad(0.15));
  },80);
}

function switchTab(name){
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('on',el.id==='view-'+name));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===name));
  document.getElementById('pillbar').style.display=(name==='route')?'flex':'none';
  if(name==='map'){renderMap();setTimeout(()=>{if(leafMap)leafMap.invalidateSize();},120);}
  if(name!=='route')window.scrollTo({top:0,behavior:'smooth'});
}

async function loadWeather(){
  try{
    const lats=DAYS.map(d=>d.lat).join(','),lons=DAYS.map(d=>d.lon).join(',');
    const url='https://api.open-meteo.com/v1/forecast?latitude='+lats+'&longitude='+lons+
      '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&start_date=2026-08-11&end_date=2026-08-25&timezone=Europe%2FPrague';
    const r=await fetch(url);if(!r.ok)throw 0;const j=await r.json();const arr=Array.isArray(j)?j:[j];
    DAYS.forEach((d,i)=>{const loc=arr[i];if(!loc||!loc.daily||loc.daily.temperature_2m_max[i]==null)return;
      const hi=Math.round(loc.daily.temperature_2m_max[i]),lo=Math.round(loc.daily.temperature_2m_min[i]);
      const code=loc.daily.weather_code[i],pp=loc.daily.precipitation_probability_max[i];
      const el=document.getElementById('wx-'+d.d);
      if(el){el.textContent=wxEmoji(code)+' '+hi+'°/'+lo+'°'+(pp!=null?' · '+pp+'%🌧️':'');el.title='תחזית חיה (Open-Meteo)';el.style.background='#e2f0e0';}
    });
  }catch(e){/* keep seasonal fallback */}
}

renderRoute();renderPills();renderHotels();renderDrive();renderInfo();loadWeather();

const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){const d=e.target.id.split('-')[1];
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.d==d));}});},{rootMargin:'-45% 0px -50% 0px'});
DAYS.forEach(day=>{const el=document.getElementById('day-'+day.d);if(el)obs.observe(el);});
</script>
