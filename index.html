<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#243b2f">
<title>צ'כיה • טיול משפחות — אוגוסט 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700;900&family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3ede0; --paper2:#ece3d2; --ink:#28251f; --muted:#7a7163;
    --line:#ddd2bd;
    --north:#2f6f7a; --south:#4f7d3a; --prague:#8a3b4c; --transit:#b07d2b;
    --gold:#b8893a; --green:#243b2f; --green2:#33543f;
    --warn:#c0561f; --card:#fbf7ee;
    --shadow:0 6px 22px rgba(40,37,31,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Heebo',sans-serif;color:var(--ink);
    background:var(--paper);
    background-image:radial-gradient(circle at 12% 8%, rgba(184,137,58,.06), transparent 40%),
                     radial-gradient(circle at 88% 92%, rgba(36,59,47,.06), transparent 42%);
    line-height:1.5;padding-bottom:84px;-webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:'Frank Ruhl Libre',serif;margin:0;line-height:1.15}

  /* HEADER */
  header{
    background:linear-gradient(160deg,#243b2f 0%,#33543f 70%,#3c6049 100%);
    color:#f3ede0;padding:26px 18px 22px;position:relative;overflow:hidden;
    border-bottom:3px solid var(--gold);
  }
  header::after{content:"";position:absolute;inset:0;opacity:.07;
    background-image:repeating-linear-gradient(45deg,#fff 0 2px,transparent 2px 9px);}
  .kicker{font-size:12.5px;letter-spacing:3px;font-weight:700;color:#e9c98a;
    text-transform:uppercase;position:relative}
  header h1{font-size:33px;font-weight:900;margin:4px 0 6px;position:relative}
  .dates{font-size:15px;color:#d8e3da;position:relative;font-weight:500}
  .countdown{position:relative;margin-top:14px;display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.12);border:1px solid rgba(233,201,138,.4);
    padding:7px 14px;border-radius:30px;font-size:13.5px;font-weight:700;color:#f3ede0;backdrop-filter:blur(4px)}
  .countdown b{color:#e9c98a;font-size:16px}
  .route-strip{position:relative;margin-top:16px;display:flex;align-items:center;gap:6px;
    flex-wrap:wrap;font-size:11.5px;font-weight:700}
  .route-strip span{background:rgba(255,255,255,.1);padding:4px 9px;border-radius:6px}
  .route-strip i{color:#e9c98a;font-style:normal}

  /* DAY PILLS */
  .pillbar{position:sticky;top:0;z-index:40;background:rgba(243,237,224,.93);
    backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    overflow-x:auto;display:flex;gap:7px;padding:10px 14px;scrollbar-width:none}
  .pillbar::-webkit-scrollbar{display:none}
  .pill{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);
    border-radius:13px;padding:6px 10px;text-align:center;cursor:pointer;
    min-width:48px;transition:.18s;line-height:1.15}
  .pill .pd{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:15px;display:block}
  .pill .pw{font-size:10px;color:var(--muted);font-weight:700}
  .pill.active{background:var(--green);border-color:var(--green);color:#fff;transform:translateY(-1px)}
  .pill.active .pw{color:#e9c98a}

  /* CONTENT */
  main{padding:16px 14px 10px;max-width:680px;margin:0 auto}
  .view{display:none;animation:fade .25s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* DAY CARD */
  .day{background:var(--card);border:1px solid var(--line);border-radius:18px;
    margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden;scroll-margin-top:64px}
  .day-head{display:flex;align-items:center;gap:13px;padding:14px 15px;
    border-bottom:1px solid var(--line);position:relative}
  .daynum{flex:0 0 auto;width:54px;height:54px;border-radius:14px;
    background:var(--green);color:#fff;display:flex;flex-direction:column;
    align-items:center;justify-content:center;line-height:1}
  .daynum .dn{font-family:'Frank Ruhl Libre',serif;font-size:22px;font-weight:900}
  .daynum .dm{font-size:10px;font-weight:700;color:#e9c98a;margin-top:2px}
  .day-head .meta{flex:1;min-width:0}
  .day-head .wd{font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:700}
  .day-head .didx{font-size:11.5px;color:var(--muted);font-weight:700}
  .rbadge{flex:0 0 auto;font-size:11.5px;font-weight:800;color:#fff;
    padding:5px 11px;border-radius:20px;white-space:nowrap}

  .stop{padding:13px 15px;border-bottom:1px dashed var(--line)}
  .stop:last-child{border-bottom:none}
  .stop .nm{font-weight:700;font-size:15.5px;display:flex;gap:7px;align-items:flex-start}
  .stop .nm .dot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 0 0;padding-inline-start:15px}
  .chip{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;display:inline-flex;gap:4px;align-items:center}
  .chip.drive{background:#e7eef0;color:#2f6f7a}
  .chip.price{background:#eaf1e3;color:#4f7d3a}
  .chip.book{background:#fbe9df;color:var(--warn)}
  .note{font-size:13.5px;color:#5a5346;margin:8px 0 0;padding-inline-start:15px;line-height:1.55}
  .nav-btn{margin:10px 0 0 0;margin-inline-start:15px;display:inline-flex;align-items:center;gap:6px;
    background:var(--green);color:#fff;text-decoration:none;font-weight:700;font-size:13px;
    padding:8px 15px;border-radius:11px;transition:.15s}
  .nav-btn:active{transform:scale(.96)}
  .nav-btn svg{width:15px;height:15px}
  .hotel{display:flex;align-items:center;gap:9px;padding:11px 15px;background:var(--paper2);
    font-size:13px;font-weight:600;color:#4a4234}
  .hotel svg{width:17px;height:17px;flex:0 0 auto;opacity:.7}
  .hotel b{font-weight:800;color:var(--ink)}

  /* GENERIC CARDS */
  .sec-title{font-size:21px;font-weight:900;margin:4px 2px 14px;display:flex;align-items:center;gap:9px}
  .sec-title .bar{width:5px;height:22px;background:var(--gold);border-radius:3px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:15px;margin-bottom:13px;box-shadow:var(--shadow)}
  .card h3{font-size:17px;font-weight:700;margin-bottom:3px}
  .card .sub{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px}
  .kv{display:flex;justify-content:space-between;gap:12px;font-size:13.5px;padding:5px 0;
    border-top:1px dashed var(--line)}
  .kv:first-of-type{border-top:none}
  .kv .k{color:var(--muted);font-weight:600;flex:0 0 auto}
  .kv .v{text-align:start;font-weight:600}
  .cost-total{background:linear-gradient(135deg,#243b2f,#33543f);color:#fff;border:none}
  .cost-total .big{font-family:'Frank Ruhl Libre',serif;font-size:30px;font-weight:900;color:#e9c98a}
  .pin{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;color:#fff}
  .task{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;padding:9px 0;border-top:1px dashed var(--line)}
  .task:first-child{border-top:none}
  .task .b{flex:0 0 auto;width:18px;height:18px;border:2px solid var(--gold);border-radius:5px;margin-top:1px}
  .backup-group{margin-bottom:8px}
  .backup-group li{font-size:13.5px;margin:0 0 7px;line-height:1.5}
  .backup-group ul{margin:6px 0 0;padding-inline-start:18px}
  .small{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}

  /* BOTTOM NAV */
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;
    background:rgba(36,59,47,.97);backdrop-filter:blur(12px);
    display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    border-top:2px solid var(--gold)}
  .tab{flex:1;background:none;border:none;color:#a9bcae;font-family:'Heebo';
    font-weight:700;font-size:11px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:3px;padding:5px 0;transition:.15s}
  .tab svg{width:21px;height:21px}
  .tab.active{color:#e9c98a}
  .tab.active svg{transform:translateY(-1px)}
</style>
</head>

   'פארק המבוכים בטירת Loučeň – האתר היחיד באירופה עם 12 מבוכים שונים (אבן, חבלים, דשא)',
   'Techmania, פלזן (Plzeň) – מוזיאון מדע אינטראקטיבי מהטובים באירופה, בדרך לפראג',
   'Toy Museum, צ׳סקי קרומלוב – מוזיאון צעצועים עתיקים קטן ומקסים',
   'ממלכת היער (Království lesa), ליפנו – פארק שעשועים ענק ליד שביל הצמרות, 3–4 שעות בקלות'
 ]
};

function mapsUrl(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q+' Czech Republic');}
function regionStyle(r){return REGION[r]||{c:'var(--muted)',e:'📍'};}

/* ---- COUNTDOWN ---- */
(function(){
  const start=new Date(2026,7,11); const now=new Date();
  const diff=Math.ceil((start-now)/86400000);
  const el=document.getElementById('countdown');
  if(diff>0) el.innerHTML='⏳ עוד <b>'+diff+'</b> ימים לטיול';
  else if(diff===0) el.innerHTML='🎉 <b>היום</b> ממריאים!';
  else { const dn=Math.min(15,Math.abs(diff)+1); el.innerHTML='🇨🇿 יום <b>'+dn+'</b> בטיול'; }
})();

/* ---- RENDER ROUTE ---- */
function renderRoute(){
  const v=document.getElementById('view-route');
  let html='';
  DAYS.forEach((day,i)=>{
    const dt=new Date(2026,7,day.d);
    const rs=regionStyle(day.region);
    let stops='';
    day.stops.forEach(s=>{
      let chips='';
      if(s.drive) chips+='<span class="chip drive">🚗 '+s.drive+'</span>';
      if(s.price) chips+='<span class="chip price">🎟️ '+s.price+'</span>';
      if(s.book)  chips+='<span class="chip book">⚠️ '+s.book+'</span>';
      stops+='<div class="stop"><div class="nm"><span class="dot"></span>'+s.nm+'</div>'+
        (chips?'<div class="chips">'+chips+'</div>':'')+
        (s.note?'<p class="note">'+s.note+'</p>':'')+
        '<a class="nav-btn" target="_blank" rel="noopener" href="'+mapsUrl(s.maps)+'">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12Z"/><circle cx="12" cy="9" r="2.5"/></svg>נווט</a></div>';
    });
    html+='<div class="day" id="day-'+day.d+'">'+
      '<div class="day-head">'+
        '<div class="daynum"><span class="dn">'+day.d+'</span><span class="dm">'+MON[7]+'</span></div>'+
        '<div class="meta"><div class="wd">'+WD[dt.getDay()]+'</div>'+
          '<div class="didx">יום '+(i+1)+' מתוך 15</div></div>'+
        '<div class="rbadge" style="background:'+rs.c+'">'+rs.e+' '+day.region+'</div>'+
      '</div>'+stops+
      '<div class="hotel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-5h18v5M3 13V7a1 1 0 0 1 1-1h6v7M14 13V8h6a1 1 0 0 1 1 1v4"/></svg>'+
        (day.hotel==='—'?'<span>טיסה הביתה ✈️</span>':'לינה: <b>'+day.hotel+'</b>')+'</div>'+
      '</div>';
  });
  v.innerHTML=html;
}

/* ---- PILLS ---- */
function renderPills(){
  const pb=document.getElementById('pillbar');
  let html='';
  DAYS.forEach(day=>{
    const dt=new Date(2026,7,day.d);
    html+='<div class="pill" data-d="'+day.d+'" onclick="goDay('+day.d+')">'+
      '<span class="pd">'+day.d+'.8</span><span class="pw">'+WS[dt.getDay()]+'</span></div>';
  });
  pb.innerHTML=html;
}
function goDay(d){
  switchTab('route');
  setTimeout(()=>{
    const el=document.getElementById('day-'+d);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.d==d));
  },60);
}

/* ---- HOTELS ---- */
function renderHotels(){
  const v=document.getElementById('view-hotels');
  let html='<h2 class="sec-title"><span class="bar"></span>מלונות ולינה</h2>';
  HOTELS.forEach(h=>{
    const rs=regionStyle(h.r.split(' ')[0]);
    html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">'+
      '<div><h3>'+h.n+'</h3></div>'+
      '<span class="pin" style="background:'+rs.c+'">'+rs.e+' '+h.r+'</span></div>'+
      '<div class="sub" style="margin-top:6px"></div>'+
      '<div class="kv"><span class="k">מחיר</span><span class="v">'+h.ils+' · '+h.other+'</span></div>'+
      (h.cancel?'<div class="kv"><span class="k">ביטול</span><span class="v">'+h.cancel+'</span></div>':'')+
      '<div class="kv"><span class="k">נסגר דרך</span><span class="v">'+h.via+'</span></div>'+
      (h.note?'<p class="small">📝 '+h.note+'</p>':'')+'</div>';
  });
  html+='<div class="card cost-total"><div class="sub" style="color:#cdd8cf">סה״כ לינה</div>'+
    '<div class="big">10,731.80 ₪</div>'+
    '<p class="small" style="color:#cdd8cf;margin-top:4px">הסכומים באירו הם המחייבים — לשים לב לשער האירו ביום החיוב.</p></div>';
  v.innerHTML=html;
}

/* ---- INFO ---- */
function renderInfo(){
  const v=document.getElementById('view-info');
  let warns='';
  DAYS.forEach(day=>day.stops.forEach(s=>{if(s.book){warns+='<div class="task"><span class="b"></span><div><b>'+day.d+'.8</b> · '+s.nm+'<br><span class="small" style="margin:0">'+s.book+'</span></div></div>';}}));
  let html='<h2 class="sec-title"><span class="bar"></span>מידע שימושי</h2>'+
    '<div class="card"><h3>✈️ טיסות</h3><div class="kv"><span class="k">חברה</span><span class="v">EL AL</span></div></div>'+
    '<div class="card"><h3>🚗 רכב / הסעות</h3>'+
      '<div class="kv"><span class="k">רכב גדול</span><span class="v">45 € ליום</span></div>'+
      '<div class="kv"><span class="k">רכב קטן</span><span class="v">35 € ליום</span></div>'+
      '<p class="small">📞 משימה: לדבר עם נהג המונית ולסגור את הנסיעה מהשדה למלון.</p></div>'+
    '<div class="card"><h3>💰 תקציב לינה</h3>'+
      '<div class="kv"><span class="k">סה״כ מלונות</span><span class="v">10,731.80 ₪</span></div>'+
      '<p class="small">לשים לב לשער האירו — הסכומים במטבע זר הם המחייבים.</p></div>'+
    '<div class="card"><h3>⚠️ הזמנות מראש (חשוב!)</h3>'+warns+'</div>'+
    '<div class="card"><h3>🎒 לא לשכוח</h3>'+
      '<div class="task"><span class="b"></span><div>מגבות + בגדי ים (מירקולום, פארקי המים, אגם ליפנו)</div></div>'+
      '<div class="task"><span class="b"></span><div>נעלי הליכה נוחות לילדים (אדרשפאך, פראחוב)</div></div>'+
      '<div class="task"><span class="b"></span><div>שכבה חמה לצפון (הרים)</div></div></div>';
  v.innerHTML=html;
}

/* ---- BACKUP ---- */
function renderBackup(){
  const v=document.getElementById('view-backup');
  let html='<h2 class="sec-title"><span class="bar"></span>אופציות גיבוי</h2>'+
    '<p class="small" style="margin:0 2px 14px">פעילויות שירדו מהמסלול אבל שווה לזכור — ליום גשום, להחלפה, או אם נשאר זמן.</p>';
  Object.keys(BACKUP).forEach(r=>{
    const rs=regionStyle(r);
    html+='<div class="card"><h3 style="display:flex;align-items:center;gap:8px">'+
      '<span class="pin" style="background:'+rs.c+'">'+rs.e+' '+r+'</span></h3>'+
      '<div class="backup-group"><ul>';
    BACKUP[r].forEach(b=>html+='<li>'+b+'</li>');
    html+='</ul></div></div>';
  });
  v.innerHTML=html;
}

/* ---- TABS ---- */
function switchTab(name){
  document.querySelectorAll('.view').forEach(el=>el.classList.toggle('on',el.id==='view-'+name));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===name));
  document.getElementById('pillbar').style.display = (name==='route')?'flex':'none';
  if(name!=='route') window.scrollTo({top:0,behavior:'smooth'});
}

renderRoute(); renderPills(); renderHotels(); renderInfo(); renderBackup();

/* highlight active day pill on scroll */
const obs=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting){const d=e.target.id.split('-')[1];
    document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('active',p.dataset.d==d));}});
},{rootMargin:'-45% 0px -50% 0px'});
DAYS.forEach(day=>{const el=document.getElementById('day-'+day.d);if(el)obs.observe(el);});
</script>
